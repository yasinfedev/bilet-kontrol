<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bilet Kontrol</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(160deg, #32104d, #7b2cbf);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: white;
  }

  .app {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-radius: 28px;
    padding: 28px 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    text-align: center;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 30px;
  }

  p {
    margin: 0 0 24px;
    opacity: 0.85;
  }

  input {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 18px;
    font-size: 28px;
    text-align: center;
    outline: none;
    margin-bottom: 16px;
  }

  button {
    width: 100%;
    padding: 17px;
    border: none;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  .check {
    background: #ffd166;
    color: #2d1846;
  }

  .reset {
    background: rgba(255,255,255,0.2);
    color: white;
  }

  .result {
    margin-top: 22px;
    min-height: 70px;
    font-size: 30px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
  }

  .win {
    background: #06d6a0;
    color: #072b22;
  }

  .lose {
    background: #ef476f;
    color: white;
  }

  .tickets {
    margin-top: 22px;
    font-size: 14px;
    opacity: 0.8;
    line-height: 1.7;
  }
</style>
</head>

<body>
  <div class="app">
    <h1>🎟️ Bilet Kontrol</h1>
    <p>Çekiliş numarasını gir</p>

    <input id="numberInput" type="number" placeholder="Örn: 3705" />

    <button class="check" onclick="checkTicket()">Kontrol Et</button>
    <button class="reset" onclick="resetApp()">Reset</button>

    <div id="result" class="result"></div>

    <div class="tickets">
      Bilet aralıkların:<br>
      3681-3699 • 3700-3740<br>
      3821-3840 • 3941-3956
    </div>
  </div>

<script>
  const ticketRanges = [
    [3681, 3699],
    [3700, 3740],
    [3821, 3840],
    [3941, 3956]
  ];

  function checkTicket() {
    const input = document.getElementById("numberInput");
    const result = document.getElementById("result");
    const number = Number(input.value);

    result.className = "result";

    if (!input.value) {
      result.textContent = "Sayı gir";
      return;
    }

    const isWinner = ticketRanges.some(([start, end]) => {
      return number >= start && number <= end;
    });

    if (isWinner) {
      result.textContent = "🎉 Kazandın!";
      result.classList.add("win");
    } else {
      result.textContent = "😔 Çıkmadı!";
      result.classList.add("lose");
    }
  }

  function resetApp() {
    document.getElementById("numberInput").value = "";
    const result = document.getElementById("result");
    result.textContent = "";
    result.className = "result";
  }
</script>
</body>
</html>
